name: Postman API Test Automation

# 언제 실행할까요? (코드를 Push하거나 Pull Request 할 때)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest # 가상 서버 환경

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 내 코드를 가상 서버로 가져오기

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman
      run: npm install -g newman # 테스트 도구 설치

    - name: Run API Tests
      env:
        # Secret을 환경 변수에 먼저 담습니다.
        GOREST_TOKEN_VAL: ${{ secrets.GOREST_TOKEN }}
      run: |
        newman run postmanstudy.postman_collection.json \
          --env-var "token=$GOREST_TOKEN_VAL" \
          --reporters cli
