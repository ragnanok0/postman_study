name: Postman API Test Automation

# 언제 실행할까요? (코드를 Push하거나 Pull Request 할 때)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest # 가상 서버 환경

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 내 코드를 가상 서버로 가져오기

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman
      run: npm install -g newman # 테스트 도구 설치

    - name: Run API Tests
      # [파일명].json 부분을 실제 본인이 올린 파일 이름으로 수정하세요!
      run: newman run "github study.postman_collection.json"
