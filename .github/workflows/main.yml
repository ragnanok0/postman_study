name: Postman API Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman
      run: npm install -g newman

    - name: Run API Tests
      env:
        # GitHub Secret에 등록된 토큰 알맹이를 환경변수로 가져옵니다.
        GOREST_TOKEN: ${{ secrets.GOREST_TOKEN }}
      run: |
        # --env-var 옵션을 통해 JSON 내부의 {{token}} 자리에 값을 주입합니다.
        newman run postmanstudy.postman_collection.json \
          --env-var "token=${GOREST_TOKEN}" \
          --reporters cli
