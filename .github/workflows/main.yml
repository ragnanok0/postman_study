name: API Test with HTML Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Run API Tests with Report
      run: |
        # htmlextra 리포터를 사용하여 results.html 파일을 생성합니다.
        newman run postmanstudy.postman_collection.json \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export results.html

    - name: Upload Test Report
      if: always() # 테스트가 실패해도 리포트는 저장하도록 설정
      uses: actions/upload-artifact@v4
      with:
        name: api-test-report
        path: results.html
